services:
  radar-jf:
    build: .
    hostname: radar-jf
    restart: unless-stopped
    environment:
      ENV: production
      PORT: "3333"
      AUTH_KEY: ${AUTH_KEY:?defina AUTH_KEY no .env}
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3333/')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
  proxy:
    external: true
